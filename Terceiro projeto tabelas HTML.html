<!DOCTYPE HTML>

<HTML>

<head>

<meta charset="utf-8">

	<title>	Treinamento de como montar tabelas
	</title>
</head>
<body>
	<h1> Primeira tabela
	</h1>
	<h2> Tabela com título e rodapé
	</h2>
	<table width="100%" border="1">
		<tr>
			<td>Mês</td>
			<td>Horas/Aula</td>
		</tr>
		<tbody>
		<tr>
			<td>Junho</td>
			<td>50</td>
		</tr>
		<tr>
			<td>Julho</td>
			<td>50</td>
		</tr>
		</tbody>
	<tfoot>
		<tr>
			<th>Total</th>
			<th>100</th>
		</tr>
	</tfoot>
	</table>
</body>
</head>

<body>
	<h2>Tabela Simples</h2>
	<!-- Tabela com Colpan -->
	<table width="100%" border="1" >
	<tr>
		<td>Aluno</td>
		<td colspan="2">Disciplina</td>
	</tr>
	<tr>
		<td>Alex</td>
		<td>Ambiente WEB</td>
	</tr>
	</table>
	<h2>Tabela Simples</h2>
	<!-- Tabela com Rowspan -->
	<table width="100%" border="1" >
	<tr>
		<td>Aluno</td>
		<td rowspan="2">Disciplina</td>
	</tr>
	<tr>
		<td>Alex</td>
		<td>HTML</td>
		<td>Ambiente WEB</td>
	</tr>
	</table>
</html>
