<!DOCTYPE HTML>

<HTML>

<head>

<meta charset="utf-8">

	<title>	Treinamento de como montar tabelas
	</title>
</head>
<body>

<form action="/pagina-processa-dados-do-form" method="post">
<fieldset>
<legend>Dados Gerais</legend>
	<Label for="nome">Nome:</label>
	<input type="text" minlength="3" id:"nome" />
	<label for="data_nascimento">Data de Nascimento:</label>
	<input type="text" id="data_nascimento" />
	<label for="cpf">CPF:</label>
	<input type="cpf" minlehgth="11" id:"cpf" />
</fieldset>
<fieldset>
  <legend>Endereço</legend>
  <label for="tipo_endereco">Tipo:</label>
  <select id="tipo_endereco" name="tipo_endereco">
    <option value="">Selecione</option>
    <option value="rua">Rua</option>
    <option value="estrada">Estrada</option>
    <option value="rodovia">Rodovia</option>
    <option value="outros">Outros</option>
  </select>

  <label for="logradouro_endereco">Logradouro:</label>
  <input type="text" id="logradouro_endereco" name="logradouro">

  <label for="numero_endereco">Número:</label>
  <input type="text" id="numero_endereco" name="numero">
</fieldset>

<fieldset>
  <legend>Fale Conosco</legend>
  <label for="msg">Mensagem:</label>
  <textarea type="text" id="msg" name="mensagem" rows="4"></textarea>
</fieldset>

<fieldset>
  <button type="submit">Enviar sua mensagem</button>
  <button type="reset">Limpar o Formulário</button>
</fieldset>
</form>
</body>
</html>
